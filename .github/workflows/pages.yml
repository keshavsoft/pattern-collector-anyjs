name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage files for deployment under docs subpath
        run: |
          mkdir staging
          cp -R docs staging/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=docs/index.html" /><script>window.location.href = "docs/index.html"</script><title>Redirecting...</title></head><body>Redirecting to <a href="docs/index.html">docs</a>...</body></html>' > staging/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4